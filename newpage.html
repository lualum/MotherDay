<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/icon16.png">
  <title>New Tab</title>
  <style>
    body,
    html {
      height: 100%;
      margin: 0;
      background: #111;
    }

    /* ── Photo plane canvas sits at the very back ── */
    #photo-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: #111;
      opacity: 0;
      transition: opacity 1.2s ease;
    }

    #bgimg {
      height: 100%;
      background-position: center;
      background-size: cover;
      position: relative;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      background-color: transparent;
      z-index: 1;
    }

    .topleft {
      position: absolute;
      top: 0;
      left: 16px;
    }

    .middle {
      width: 100%;
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    #myVideo {
      position: fixed;
      right: 0;
      bottom: 0;
      min-width: 100%;
      min-height: 100%;
      z-index: 0;
    }

    #settings-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 20;
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      font-size: 18px;
      transition: color 0.2s;
    }

    #settings-btn:hover {
      color: rgba(255, 255, 255, 0.9);
    }

    /* ── Settings panel ── */
    #photo-controls {
      position: fixed;
      bottom: 64px;
      right: 20px;
      z-index: 20;
      background: rgba(16, 16, 16, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      padding: 16px 18px;
      width: 228px;
      backdrop-filter: blur(20px);
      display: none;
      flex-direction: column;
      gap: 12px;
    }

    #photo-controls.open {
      display: flex;
    }

    .ctrl-label {
      font-size: 10px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 3px;
    }

    .ctrl-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .ctrl-row input[type=range] {
      flex: 1;
      accent-color: #fff;
      height: 3px;
    }

    .ctrl-val {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.6);
      min-width: 26px;
      text-align: right;
    }
  </style>
</head>

<body>

  <!-- Photo plane canvas — behind everything -->
  <canvas id="photo-canvas"></canvas>

  <!-- Original content -->
  <div id="bgimg">
    <video muted loop id="myVideo"></video>
    <div class="middle">
      <span style="font-size: 20vh; font-weight: 100; text-shadow: 0 0 2px gray;" id="time"></span><br>
      <span style="font-size: 5vh; font-weight: 200; text-shadow: 0 0 2px gray;" id="date"></span><br><br>
      <span style="font-size: 3vh; text-shadow: 0 0 2px gray;" id="battery"></span>
    </div>
  </div>

  <!-- Photo plane settings -->
  <button id="settings-btn">⚙</button>
  <div id="photo-controls">
    <div>
      <div class="ctrl-label">Speed</div>
      <div class="ctrl-row">
        <input type="range" id="ctrl-speed" min="0.2" max="5" step="0.1" value="1.2">
        <span class="ctrl-val" id="val-speed">1.2</span>
      </div>
    </div>
    <div>
      <div class="ctrl-label">Density</div>
      <div class="ctrl-row">
        <input type="range" id="ctrl-density" min="4" max="30" step="1" value="14">
        <span class="ctrl-val" id="val-density">14</span>
      </div>
    </div>
    <div>
      <div class="ctrl-label">Size variation</div>
      <div class="ctrl-row">
        <input type="range" id="ctrl-sizevar" min="1" max="6" step="0.1" value="3">
        <span class="ctrl-val" id="val-sizevar">3.0</span>
      </div>
    </div>
    <div>
      <div class="ctrl-label">Direction</div>
      <div class="ctrl-row">
        <input type="range" id="ctrl-angle" min="-60" max="60" step="5" value="0">
        <span class="ctrl-val" id="val-angle">0°</span>
      </div>
    </div>
  </div>

  <script defer src="index.js"></script>
  <script defer src="photos.js"></script>
</body>

</html>
